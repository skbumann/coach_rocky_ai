services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user_name
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: activities_pgdb
    ports:
      - "5433:5432"
    volumes:
      # Map schema.sql to Postgres folder
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Saves the data in case container stops
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # CRITICAL: Use 'db' (the service name) instead of 'localhost'
      - DATABASE_URL=postgresql://user_name:secret_password@db:5432/activities_pgdb
      - TZ=America/Los_Angeles
    ports:
      - "8000:8000"

volumes:
  postgres_data: